<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}
.centerContent {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background-color: #f0f0f0; /* arka plan rengi */
    height: 100vh; /* ekran yüksekliği kadar genişlik */
}
.paddingTop {
    padding-top: 20px;
}
.contactForm {
    background-color: #fff; /* form arka plan rengi */
    padding: 20px;
    border: 2px solid #000; /* siyah kenarlık */
    border-radius: 10px; /* kenar yuvarlatma */
    max-width: 500px; /* maksimum genişlik */
}
.inputFields {
    margin-bottom: 20px;
}
.inputFields input[type="text"],
.inputFields input[type="email"] {
    width: 300px; /* isim ve email kutusu genişliği */
    height: 30px; /* isim ve email kutusu yüksekliği */
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #000; /* siyah kenarlık */
    border-radius: 5px; /* kenar yuvarlatma */
}
.contactForm__input.textBox {
    width: 300px; /* mesaj kutusu genişliği */
    height: 200px; /* mesaj kutusu yüksekliği */
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #000; /* siyah kenarlık */
    border-radius: 5px; /* kenar yuvarlatma */
    resize: none; /* yeniden boyutlandırmayı devre dışı bırak */
}
#g-recaptcha {
    /* reCAPTCHA stili */
}
.contactForm__submit {
    background-color: #000; /* gönder düğmesi arka plan rengi */
    color: #fff; /* gönder düğmesi metin rengi */
    padding: 10px 20px;
    border: none;
    border-radius: 5px; /* kenar yuvarlatma */
    cursor: pointer;
}
.contactForm__submit:hover {
    background-color: #333; /* üzerine gelindiğinde arka plan rengi */
}
.successBox {
    display: none;
    background-color: #00ff00; /* başarılı kutusu arka plan rengi */
    padding: 10px;
    border-radius: 5px; /* kenar yuvarlatma */
    margin-top: 20px;
}
.successMsg {
    color: #000; /* başarılı mesaj metin rengi */
    font-weight: bold;
    text-align: center;
}
</style>
</head>
<body>

<section id="contact" class="paddingTop centerContent">
    <h1 class="content__heading">Get in Touch</h1>
    <hr>

    <form class="contactForm js-contactForm" id="ajaxForm" action="https://formcarry.com/s/G-4SQ70qhCMS" method="POST" accept-charset="UTF-8">
        <div class="inputFields">
            <input type="text" placeholder="Name" id="name" class="contactForm__input input" name="name" autocomplete="name" required="">
            <input type="email" placeholder="Email" id="email" class="contactForm__input input" name="email" autocomplete="email" required="">
        </div>
        <textarea name="message" id="message" class="contactForm__input textBox" cols="30" rows="10" placeholder="Message" required=""></textarea>
        <div id="g-recaptcha">
            <!-- reCAPTCHA -->
        </div>
        <br>
        <input type="submit" name="submit" value="Send Message" class="contactForm__submit">
    </form>

    <script src="https://carrier.formcarry.com/js/v1.js"></script>
    <script>
        formcarry({
            form: "G-4SQ70qhCMS",
            element: "#ajaxForm",
            extraData: {
                screenSize: `${window.screen.width}x${window.screen.height}`,
                language: window.navigator.language,
            },
            onSuccess: function(response) {
                alert(response)
            },
            onError: function(error) {
                alert(error)
            }
        });
    </script>

    <div id="submitSuccess" class="successBox">
        <p class="successMsg" id="successMsg">Message Sent!</p>
    </div>
</section>

</body>
</html>
